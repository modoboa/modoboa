on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'modoboa/**'
      - 'frontend/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'modoboa/**'
      - 'frontend/**'

jobs:
  cache-and-install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          cache: true
          cache_dependency_path: doc-ng/pnpm-lock.yaml
          package_json_file: doc-ng/package.json

      - name: Install dependencies
        run: cd doc-ng && pnpm install

      - name: Build documentation
        run: cd doc-ng && pnpm run build
